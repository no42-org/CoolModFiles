name: E2E

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: npm
      # Firefox uses cubeb for audio and needs a real backend — without
      # one, AudioContext can't transition to 'running' regardless of any
      # JS fix. Chromium and WebKit have built-in null sinks; Firefox
      # doesn't. Install and start pulseaudio so cubeb has a socket.
      - name: Install and start PulseAudio (Firefox audio backend)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pulseaudio
          pulseaudio --start --exit-idle-time=-1
      - run: make e2e
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
