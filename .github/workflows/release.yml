name: Release

on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/no42-org/coolmodfiles

jobs:
  release:
    runs-on: ubuntu-latest
    # Job-scoped permissions: any future job in this workflow (e.g. a
    # notification or SBOM uploader) must opt-in to id-token minting
    # rather than inherit it.
    permissions:
      contents: write
      packages: write
      # Required for cosign's keyless signing flow: the runner requests
      # an OIDC token from GitHub which Sigstore's Fulcio exchanges for
      # a short-lived signing certificate. No long-lived keys are
      # stored in the repo or in GitHub Secrets.
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 20
          cache: npm

      # Fail fast if the tag and package.json version disagree. Without
      # this guard a release could ship with a stale package.json (and a
      # stale npm "name@version" identifier in any tooling that reads it)
      # while the git tag, container tags, and APP_VERSION env all carry
      # the new number — silent drift that's only noticeable downstream.
      # See RELEASING.md for the human-side procedure.
      - name: Verify package.json version matches tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${REF_NAME#v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "${tag_version}" != "${pkg_version}" ]; then
            echo "::error::Tag ${REF_NAME} (=> ${tag_version}) does not match package.json version ${pkg_version}. Bump package.json before tagging — see RELEASING.md." >&2
            exit 1
          fi

      - run: make verify

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          # Pin the cosign binary explicitly so a Dependabot bump of the
          # installer action doesn't silently change the signer version
          # under us. Dependabot also tracks `cosign-release:` updates.
          cosign-release: v3.0.6

      - uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7  # v4.5.1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign (keyless / OIDC)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # Fail fast on an empty tag list — without this guard, a
          # downstream change that produces zero tags would silently
          # publish an unsigned image with the workflow green.
          if [ -z "${TAGS}" ]; then
            echo "::error::No tags produced by metadata-action; refusing to leave image unsigned" >&2
            exit 1
          fi
          # Sign each tag@digest reference, recursing into the
          # per-platform child manifests of the multi-arch image index.
          # Without --recursive, only the index is signed; policy
          # engines that pin to per-platform digests (Kyverno,
          # sigstore policy-controller) would fail to verify amd64/arm64
          # child manifests directly.
          #
          # Verify with:
          #   cosign verify ghcr.io/no42-org/coolmodfiles:vX.Y.Z \
          #     --certificate-identity-regexp '^https://github\.com/no42-org/CoolModFiles/\.github/workflows/release\.yml@refs/tags/v.*$' \
          #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
          while IFS= read -r tag; do
            [ -n "${tag}" ] || continue
            cosign sign --yes --recursive "${tag}@${DIGEST}"
          done <<< "${TAGS}"

      - name: Create GitHub Release (draft, auto-generated notes)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --draft
